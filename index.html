<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f9fafb" />
    <link rel="icon" type="image/svg+xml" href="/landing/Favicon%20(512%20x%20512).svg" />
    <title>Project Management Dashboard UI</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.fontshare.com" />
    <link rel="dns-prefetch" href="https://cdn.fontshare.com" />
    <!--
      Sarina (brand mark) is preloaded so it's in the cache before the first
      paint of the landing/auth pages — without this the browser default font
      shows for ~200ms then flickers to Sarina. The matching @font-face below
      uses the same /fonts/ URL so the preload is actually consumed.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/sarina-latin-400-normal.woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "Sarina";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src:
          url("/fonts/sarina-latin-400-normal.woff2") format("woff2"),
          url("/fonts/sarina-latin-400-normal.woff") format("woff");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Sarina";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src:
          url("/fonts/sarina-latin-ext-400-normal.woff2") format("woff2"),
          url("/fonts/sarina-latin-ext-400-normal.woff") format("woff");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7,
          U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F,
          U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F,
          U+A720-A7FF;
      }
      /*
       * Critical path CSS (inlined): first paint before the Vite bundle + index.css load.
       * Mirrors auth/loading gradient intent; full theme tokens live in src/styles/theme.css.
       * Coverage: Chrome DevTools → ⋮ → More tools → Coverage → record while loading /dashboard.
       */
      :root {
        --boot-gradient-start: #a8e5fe;
        --boot-gradient-end: #faf8f4;
        --boot-text: #0b191f;
        --boot-tagline: rgba(4, 89, 128, 0.8);
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: linear-gradient(
          to bottom,
          var(--boot-gradient-start) 0%,
          var(--boot-gradient-end) 100%
        );
        color: var(--boot-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif,
          system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100%;
      }
      .boot-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        min-height: 100vh;
        width: 100%;
        padding: 40px;
        background: linear-gradient(
          to bottom,
          var(--boot-gradient-start) 0%,
          var(--boot-gradient-end) 100%
        );
      }
      .boot-loading__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 19.38px;
        width: min(354px, calc(100vw - 48px));
      }
      .boot-loading__logo {
        display: block;
        width: 100%;
        height: auto;
        max-height: 60px;
        object-fit: contain;
        animation: boot-pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .boot-loading__tagline {
        margin: 0;
        width: 100%;
        max-width: 235px;
        text-align: center;
        font-size: 19.38px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: -0.19px;
        color: var(--boot-tagline);
        animation: boot-pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        animation-delay: 0.2s;
      }
      .boot-loading__sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }
      @keyframes boot-pulse-soft {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-loading__logo,
        .boot-loading__tagline {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="boot-loading" role="status" aria-live="polite">
        <div class="boot-loading__inner">
          <img
            class="boot-loading__logo"
            src="/auth/Wordmark_colour.svg"
            alt=""
            width="354"
            height="60"
            decoding="async"
          />
          <p class="boot-loading__tagline">Time track with one click...</p>
          <span class="boot-loading__sr">Loading</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

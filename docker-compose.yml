services:
  frontend:
    build: .
    container_name: continuum-mvp
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
    extra_hosts:
      # Let the container reach the host (e.g. backend on localhost:8001)
      - "host.docker.internal:host-gateway"
    environment:
      # Do NOT set VITE_API_BASE_URL — keeping it unset forces axios to use the relative
      # path "/api/v1" so all requests go through the Vite proxy (no CORS issues).
      - VITE_PROXY_TARGET=http://host.docker.internal:8001 # Proxy /api to backend on host
    restart: unless-stopped

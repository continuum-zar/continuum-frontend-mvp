services:
  frontend:
    build: .
    container_name: continuum-mvp
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      # Keep host node_modules out of the bind mount; volume is empty on first run — entrypoint runs npm ci.
      - /app/node_modules
    extra_hosts:
      # Let the container reach the host (e.g. backend on localhost:8001)
      - "host.docker.internal:host-gateway"
    environment:
      # Unset VITE_API_BASE_URL: dev server defaults to direct http://127.0.0.1:8001/api/v1 from the
      # browser (avoids Vite proxy dropping long LLM responses). Set VITE_API_BASE_URL=/api/v1 to proxy.
      - VITE_PROXY_TARGET=http://host.docker.internal:8001
    restart: unless-stopped

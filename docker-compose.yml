services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: continuum-mvp
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      # Keep host node_modules out of the bind mount; volume is empty on first run — entrypoint runs npm ci.
      - /app/node_modules
    extra_hosts:
      # Let the container reach the host (e.g. backend on localhost:8001)
      - "host.docker.internal:host-gateway"
    environment:
      - VITE_PROXY_TARGET=http://host.docker.internal:8001
    # This compose file runs the Vite DEV server (Dockerfile.dev) — a long-lived Node
    # process holding the full module graph + chokidar file watchers (~300-600 MB RSS).
    # It is for LOCAL DEVELOPMENT ONLY. Do NOT deploy it: production must use the
    # multi-stage `Dockerfile` (nginx serving static files). `restart: "no"` keeps a
    # forgotten dev container from being resurrected and held in memory indefinitely.
    restart: "no"
